name: Deploy Dev

on:
  push:
    branches: [dev]

concurrency:
  group: cdk-deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Synth
        env:
          STAGE: dev
          CDK_DEV_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: npx cdk synth

      - name: Deploy
        env:
          STAGE: dev
          CDK_DEV_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: npx cdk deploy FrontendStack-dev --require-approval never --outputs-file cdk-outputs.json

      - name: Read CDK outputs
        id: cdk-outputs
        run: |
            BUCKET_NAME=$(cat cdk-outputs.json | jq -r '."FrontendStack-dev".BucketName')
            DISTRIBUTION_ID=$(cat cdk-outputs.json | jq -r '."FrontendStack-dev".DistributionId')
            echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
            echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Checkout website repo
        uses: actions/checkout@v4.2.2
        with:
          repository: lrasata/lrasata-website
          path: website

      - name: Build website
        working-directory: website
        run: |
          npm ci
          npm run build

      - name: Sync to S3
        run: aws s3 sync website/dist/ s3://${{ steps.cdk-outputs.outputs.bucket_name }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.cdk-outputs.outputs.distribution_id }} --paths "/*"
